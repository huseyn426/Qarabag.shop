<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | Qarabag Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8f9fa; padding: 40px; color: #333; }
        .admin-card { max-width: 700px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { font-weight: 800; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 20px; border-left: 5px solid #0047AB; padding-left: 15px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
        button { background: #000; color: #fff; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        button:hover { background: #0047AB; }
        #preview { width: 100%; max-height: 200px; object-fit: contain; display: none; margin: 10px 0; border-radius: 8px; background: #f0f0f0; }
        .product-item { display: flex; align-items: center; background: #fff; padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px solid #eee; }
        .product-item img { width: 60px; height: 60px; border-radius: 5px; object-fit: cover; margin-right: 15px; }
        .product-item info { flex-grow: 1; }
        .btn-delete { width: auto; background: #ff4444; padding: 8px 15px; font-size: 12px; }
        .storage-warning { font-size: 12px; color: #888; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>Məhsul Əlavə Et</h2>
    <input type="text" id="name" placeholder="Məhsulun adı">
    <select id="cat">
        <option value="Hoodies">Hudi</option>
        <option value="T-shirts">Köynəklər</option>
        <option value="Scarfs">Şərflər</option>
        <option value="Other">Digər</option>
    </select>
    <input type="number" id="price" placeholder="Qiymət (AZN)">
    <label style="font-size: 12px; font-weight: bold;">Şəkil seç:</label>
    <input type="file" id="file" accept="image/*">
    <canvas id="canvas" style="display:none;"></canvas> <img id="preview">
    <button onclick="saveProduct()">Yadda Saxla</button>
    <div class="storage-warning">Şəkillər avtomatik sıxılır ki, yaddaş dolmasın.</div>
    
    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">
    
    <h3>Məhsul Siyahısı</h3>
    <div id="list"></div>
    <br>
    <a href="index.html" style="display: block; text-align: center; color: #0047AB; text-decoration: none; font-weight: bold;">← Sayta qayıt</a>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('qarabag_products')) || [];
    let compressedImg = "";

    // Функция сжатия изображения
    document.getElementById('file').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.getElementById('canvas');
                const ctx = canvas.getContext('2d');
                
                // Устанавливаем макс. размер 600px
                const maxWidth = 600;
                const scale = maxWidth / img.width;
                canvas.width = maxWidth;
                canvas.height = img.height * scale;

                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                // Сжимаем до 70% качества (JPEG)
                compressedImg = canvas.toDataURL('image/jpeg', 0.7);
                document.getElementById('preview').src = compressedImg;
                document.getElementById('preview').style.display = "block";
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    function saveProduct() {
        const name = document.getElementById('name').value;
        const cat = document.getElementById('cat').value;
        const price = document.getElementById('price').value;

        if (!name || !price || !compressedImg) {
            alert("Zəhmət olmasa bütün xanaları doldurun!");
            return;
        }

        try {
            products.push({ id: Date.now(), name, category: cat, price, img: compressedImg });
            localStorage.setItem('qarabag_products', JSON.stringify(products));
            location.reload();
        } catch (e) {
            alert("Yaddaş dolub! Köhnə məhsulları silin.");
        }
    }

    function deleteProduct(id) {
        products = products.filter(p => p.id !== id);
        localStorage.setItem('qarabag_products', JSON.stringify(products));
        location.reload();
    }

    document.getElementById('list').innerHTML = products.map(p => `
        <div class="product-item">
            <img src="${p.img}">
            <div class="info">
                <strong>${p.name}</strong><br>
                <small>${p.price} AZN</small>
            </div>
            <button class="btn-delete" onclick="deleteProduct(${p.id})">Sil</button>
        </div>
    `).join('');
</script>

</body>
</html>
